```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    font-family:'Arial',sans-serif;
    overflow:hidden;
    color:white;
}

h1{
    font-size:4rem;
    text-shadow:2px 2px 10px rgba(0,0,0,0.3);
    animation: glow 2s infinite alternate;
}

p{
    margin-top:15px;
    font-size:1.4rem;
}

button{
    margin-top:25px;
    padding:15px 30px;
    font-size:1.1rem;
    border:none;
    border-radius:50px;
    background:white;
    color:#ff4f81;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

@keyframes glow{
    from{
        text-shadow:0 0 10px #fff;
    }
    to{
        text-shadow:0 0 30px #fff,0 0 50px #fff;
    }
}

.balloon{
    position:absolute;
    bottom:-150px;
    width:70px;
    height:90px;
    border-radius:50%;
    animation:float 10s linear infinite;
}

.balloon::after{
    content:"";
    position:absolute;
    width:2px;
    height:80px;
    background:white;
    left:50%;
    top:90px;
}

@keyframes float{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-120vh);
    }
}
</style>
</head>

<body>

<h1>🎂 Happy Birthday 🎂</h1>
<p>Chúc bạn luôn vui vẻ, mạnh khỏe và thành công!</p>

<button onclick="birthdayWish()">🎁 Mở quà</button>

<script>
function birthdayWish(){
    alert("🎉 Chúc mừng sinh nhật! Chúc bạn một tuổi mới thật hạnh phúc và đạt được mọi điều mong muốn! 🎂");
}

const colors = ["#ff4d6d","#ffd60a","#4cc9f0","#80ed99","#ff85a1"];

for(let i=0;i<20;i++){
    let balloon=document.createElement("div");
    balloon.classList.add("balloon");

    balloon.style.background=
        colors[Math.floor(Math.random()*colors.length)];

    balloon.style.left=Math.random()*100+"vw";
    balloon.style.animationDuration=
        (6+Math.random()*6)+"s";

    document.body.appendChild(balloon);
}
</script>

</body>
</html>
